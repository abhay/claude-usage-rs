name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build (native)
        if: '!matrix.cross'
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET"

      - name: Build (cross)
        if: matrix.cross
        env:
          TARGET: ${{ matrix.target }}
        run: cross build --release --target "$TARGET"

      - name: Package
        env:
          TAG_NAME: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          NAME="claude-usage-${TAG_NAME}-${TARGET}"
          mkdir "$NAME"
          cp "target/${TARGET}/release/claude-usage" "$NAME/"
          cp README.md LICENSE config/windows.json "$NAME/"
          tar czf "$NAME.tar.gz" "$NAME"
          sha256sum "$NAME.tar.gz" >> checksums.txt || shasum -a 256 "$NAME.tar.gz" >> checksums.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: binary-${{ matrix.target }}
          path: |
            claude-usage-*.tar.gz
            checksums.txt

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Merge checksums
        run: |
          cat checksums.txt | sort > checksums-final.txt
          mv checksums-final.txt checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-usage-*.tar.gz
            checksums.txt
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Update Homebrew formula
        env:
          TAG_NAME: ${{ github.ref_name }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: .github/update-homebrew.sh
